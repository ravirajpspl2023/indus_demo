version: '3.8'

services:

  redis:
    image: redis:7-alpine
    container_name: redis_database
    restart: always
    ports:
      - "6379:6379"
    network_mode: host
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    logging:
      driver: "json-file"
      options:
        max-size: "10m"

volumes:
  redis-data: